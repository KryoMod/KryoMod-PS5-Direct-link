name: Scrape dlpsgame PS5 catalog

on:
  schedule:
    # Tous les jours à 04:00 UTC (06:00 Paris en été / 05:00 en hiver)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Nombre max de pages de catégorie à parcourir (vide = tout)"
        required: false
        default: ""
      max_games:
        description: "Nombre max de jeux à scraper (vide = tout)"
        required: false
        default: ""
      no_cache:
        description: "Désactiver le cache disque (force le re-scrap complet)"
        type: boolean
        required: false
        default: false
      scrape_mode:
        description: "Mode de scraping (full = tout, incremental = seulement les nouveaux/modifiés)"
        type: choice
        options:
          - incremental
          - full
        required: false
        default: incremental
      skip_superpsx:
        description: "Ignorer la source SuperPSX"
        type: boolean
        required: false
        default: false
      skip_wp_api:
        description: "Ignorer l'API WordPress (forcer le scraper HTML)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: scrape-dlpsgame
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # ITEM 4 : un run réel prend ~3h30 aujourd'hui (avant les optimisations de
    # parallélisation). On borne à 180 min pour ne pas le tuer pendant la
    # transition, tout en évitant les jobs zombies (l'ancien 1200 était excessif).
    timeout-minutes: 180

    services:
      # FlareSolverr résout les challenges Cloudflare via un vrai Chrome
      # non-headless. Les IP datacenter de GitHub Actions sont bloquées
      # par Cloudflare (403), donc on a besoin de ce proxy.
      # ITEM 12 : 3 instances (8191/8192/8193) pour alimenter le pool round-robin
      # du fallback HTML (FLARESOLVERR_URLS). 8191 reste l'instance nominale.
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
        options: >-
          --health-cmd "curl -fs http://localhost:8191/health | grep -q ok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      flaresolverr2:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8192:8191
        env:
          LOG_LEVEL: info
        options: >-
          --health-cmd "curl -fs http://localhost:8191/health | grep -q ok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      flaresolverr3:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8193:8191
        env:
          LOG_LEVEL: info
        options: >-
          --health-cmd "curl -fs http://localhost:8191/health | grep -q ok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      # Instances 4 et 5 : accélèrent SuperPSX (pool concurrency 5). LOG_LEVEL
      # warning pour limiter le bruit. ~5 Chrome max raisonnable sur un runner 7 Go.
      flaresolverr4:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8194:8191
        env:
          LOG_LEVEL: warning
        options: >-
          --health-cmd "curl -fs http://localhost:8191/health | grep -q ok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      flaresolverr5:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8195:8191
        env:
          LOG_LEVEL: warning
        options: >-
          --health-cmd "curl -fs http://localhost:8191/health | grep -q ok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run module self-tests
        run: |
          # Garde-fous : les auto-tests sortent != 0 en cas de régression
          # (notamment le bug de taille « to » et la taxonomie des formats).
          python3 scripts/sizes.py
          python3 scripts/formats.py

      - name: Determine scrape mode
        id: config
        run: |
          # ITEM 11 : mode incremental par défaut. Le full devient MENSUEL
          # (1er jour du mois) au lieu d'hebdomadaire (lundi) : l'incrémental réel
          # piloté par 'modified' rend le full hebdo superflu et coûteux.
          # workflow_dispatch + choix manuel (scrape_mode=full) restent prioritaires.
          MODE="${{ github.event.inputs.scrape_mode || 'incremental' }}"
          if [ "$(date +%d)" = "01" ] && [ "$MODE" = "incremental" ]; then
            echo "  1er du mois détecté → mode full mensuel forcé"
            MODE="full"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "  Mode de scraping : $MODE"

      - name: Restore scrape cache + manifest
        uses: actions/cache@v4
        with:
          path: |
            .scrape_cache
            .scrape_cache_api
            .scrape_cache_superpsx
            .scrape_manifest.json
            .scrape_manifest_api.json
            .scrape_manifest_superpsx.json
          # ITEM 2 : clé STABLE (v1) au lieu de github.run_id. Une clé unique par run
          # ne réutilisait jamais le cache écrit (toujours un miss restauré via
          # restore-keys, jamais de re-save sur la même clé) → l'incrémental et le
          # cache de résolution restaient factices. Clé stable = vrai cache entre runs.
          key: scrape-cache-${{ runner.os }}-v1
          restore-keys: |
            scrape-cache-${{ runner.os }}-

      - name: Wait for FlareSolverr
        run: |
          # ITEM 12 : on attend les 3 instances (8191/8192/8193). 8191 est
          # bloquante (instance nominale) ; 8192/8193 alimentent le pool round-robin
          # du fallback HTML — on les attend aussi pour exporter FLARESOLVERR_URLS.
          for port in 8191 8192 8193 8194 8195; do
            echo "Attente du démarrage de FlareSolverr sur le port $port..."
            ready=0
            for i in $(seq 1 60); do
              if curl -sf "http://localhost:${port}/health" > /dev/null 2>&1; then
                echo "  FlareSolverr ($port) est prêt !"
                ready=1
                break
              fi
              echo "  tentative $i/60 — FlareSolverr ($port) pas encore prêt..."
              sleep 5
            done
            if [ "$ready" != "1" ]; then
              if [ "$port" = "8191" ]; then
                echo "ERREUR: FlareSolverr nominal (8191) n'a pas démarré à temps"
                exit 1
              fi
              echo "::warning::FlareSolverr ($port) indisponible — le pool tournera en mode dégradé."
            fi
          done
          # Construit la liste CSV des instances RÉELLEMENT en bonne santé pour le pool.
          URLS=""
          for port in 8191 8192 8193 8194 8195; do
            if curl -sf "http://localhost:${port}/health" > /dev/null 2>&1; then
              URLS="${URLS:+$URLS,}http://localhost:${port}/v1"
            fi
          done
          echo "FLARESOLVERR_URLS=$URLS" >> "$GITHUB_ENV"
          echo "  Pool FlareSolverr : $URLS"

      - name: Test FlareSolverr with dlpsgame.com
        continue-on-error: true
        run: |
          echo "Test de résolution Cloudflare sur dlpsgame.com..."
          RESPONSE=$(curl -s -X POST http://localhost:8191/v1 \
            -H "Content-Type: application/json" \
            -d '{"cmd":"request.get","url":"https://dlpsgame.com/category/ps5/","maxTimeout":60000}')
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f\"  FlareSolverr status: {data.get('status')}\")
          sol = data.get('solution', {})
          print(f\"  HTTP status: {sol.get('status')}\")
          html = sol.get('response', '')
          print(f\"  HTML length: {len(html)}\")
          if 'Just a moment' in html[:500]:
            print('  ⚠ Challenge Cloudflare NON résolu')
            sys.exit(1)
          else:
            print('  ✓ Challenge Cloudflare résolu')
          "

      # ──────────────────────────────────────────────────────────────
      # SOURCE 1 : dlpsgame.com via API WordPress (avec fallback FlareSolverr)
      # ──────────────────────────────────────────────────────────────
      - name: Scrape dlpsgame via WP API
        id: wp_api
        continue-on-error: true
        timeout-minutes: 120
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          if [ "${{ github.event.inputs.skip_wp_api }}" = "true" ]; then
            echo "API WordPress ignorée (skip_wp_api=true)"
            echo "games=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "=== Scraping via API WordPress ==="
          ARGS=("--out" "dlpsgame-ps5.fresh.json")
          ARGS+=("--flaresolverr-url" "http://localhost:8191/v1")
          ARGS+=("--mode" "${{ steps.config.outputs.mode }}")
          # ITEM 8 : pré-résolution concurrente des redirections (le correctif du 3h30).
          ARGS+=("--redirect-concurrency" "32")
          if [ -n "${{ github.event.inputs.max_pages }}" ]; then
            ARGS+=("--max-pages" "${{ github.event.inputs.max_pages }}")
          fi
          if [ -n "${{ github.event.inputs.max_games }}" ]; then
            ARGS+=("--max-games" "${{ github.event.inputs.max_games }}")
          fi
          if [ "${{ github.event.inputs.no_cache }}" = "true" ]; then
            ARGS+=("--no-cache")
          fi
          ARGS+=("--verbose")
          python scripts/scrape_wp_api.py "${ARGS[@]}"

          # ITEM 1 : on expose le nombre de jeux produits pour décider du fallback HTML.
          N=$(python3 -c "import json; print(len(json.load(open('dlpsgame-ps5.fresh.json')).get('packages',[])))" 2>/dev/null || echo 0)
          echo "  WP API : $N jeux produits"
          echo "games=$N" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────────────────────
      # SOURCE 1b : dlpsgame.com via scraper HTML (fallback si API échoue)
      # ──────────────────────────────────────────────────────────────
      - name: Scrape dlpsgame via HTML (fallback)
        # ITEM 1 : fallback déclenché si l'API a vraiment ÉCHOUÉ, ou si elle n'a
        # produit aucun jeu EN MODE FULL (en incrémental, 0 jeu modifié est NORMAL,
        # pas un échec → on ne relance pas un scrape HTML complet pour rien), ou si
        # l'opérateur force le HTML via skip_wp_api=true.
        # continue-on-error : un échec du fallback ne doit PAS tuer les autres
        # sources (SuperPSX/exFAT) ni le merge ; le garde-fou merge protège les données.
        if: ${{ steps.wp_api.outcome == 'failure' || (steps.wp_api.outputs.games == '0' && steps.config.outputs.mode == 'full') || github.event.inputs.skip_wp_api == 'true' }}
        continue-on-error: true
        timeout-minutes: 150
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          echo "=== API indisponible/vide — fallback vers scraper HTML ==="
          ARGS=("--http-backend" "flaresolverr")
          ARGS+=("--flaresolverr-url" "http://localhost:8191/v1")
          # ITEM 12 : 3 voies via le pool round-robin (FLARESOLVERR_URLS exporté plus haut).
          ARGS+=("--concurrency" "3")
          ARGS+=("--mode" "${{ steps.config.outputs.mode }}")
          ARGS+=("--checkpoint-every" "50")
          if [ -n "${{ github.event.inputs.max_pages }}" ]; then
            ARGS+=("--max-pages" "${{ github.event.inputs.max_pages }}")
          fi
          if [ -n "${{ github.event.inputs.max_games }}" ]; then
            ARGS+=("--max-games" "${{ github.event.inputs.max_games }}")
          fi
          if [ "${{ github.event.inputs.no_cache }}" = "true" ]; then
            ARGS+=("--no-cache")
          fi
          ARGS+=("--out" "dlpsgame-ps5.fresh.json")
          ARGS+=("--verbose")
          python scripts/scrape_dlpsgame.py "${ARGS[@]}"

      # ──────────────────────────────────────────────────────────────
      # SOURCE 2 : superpsx.com (DERRIÈRE Cloudflare → FlareSolverr requis)
      # ──────────────────────────────────────────────────────────────
      - name: Scrape SuperPSX
        continue-on-error: true
        # Source indépendante : tourne même si le chemin dlpsgame a échoué (!cancelled).
        if: ${{ !cancelled() && github.event.inputs.skip_superpsx != 'true' }}
        timeout-minutes: 90
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: |
          echo "=== Scraping SuperPSX (FlareSolverr) ==="
          # superpsx.com est passé derrière Cloudflare (403 en curl direct) → FlareSolverr.
          # Les liens de DL sont des "link-lockers" keepshield.org, résolus en vrais
          # miroirs (vikingfile/1fichier…) via FlareSolverr (JS rendu).
          # FLARESOLVERR_URLS (pool 3 instances) est exporté plus haut → la concurrence
          # est automatiquement plafonnée à la taille du pool.
          ARGS=("--out" "superpsx-ps5.fresh.json")
          ARGS+=("--mode" "${{ steps.config.outputs.mode }}")
          ARGS+=("--http-backend" "flaresolverr")
          ARGS+=("--flaresolverr-url" "http://localhost:8191/v1")
          # Pool 5 instances (8191-8195) → 5 fiches en parallèle (cf. services).
          ARGS+=("--concurrency" "5")
          if [ -n "${{ github.event.inputs.max_games }}" ]; then
            ARGS+=("--max-games" "${{ github.event.inputs.max_games }}")
          fi
          ARGS+=("--verbose")
          python scripts/scrape_superpsx.py "${ARGS[@]}"

      # ──────────────────────────────────────────────────────────────
      # SOURCE 3 : exFAT JSON distant (non-bloquant)
      # ──────────────────────────────────────────────────────────────
      - name: Import exFAT source
        continue-on-error: true
        # Source indépendante : tourne même si un chemin précédent a échoué.
        if: ${{ !cancelled() }}
        run: |
          # Source secondaire (non-bloquante). Si elle échoue, on continue avec
          # uniquement dlpsgame ; l'étape de fusion gère l'absence du fichier.
          python scripts/import_exfat.py --out exfat-ps5.fresh.json --verbose

      # ──────────────────────────────────────────────────────────────
      # FUSION INCRÉMENTALE
      # ──────────────────────────────────────────────────────────────
      - name: Merge fresh sources into existing catalog (incremental)
        # Tourne même si le chemin dlpsgame a échoué : SuperPSX/exFAT peuvent avoir
        # produit des données ; le garde-fou merge conserve l'existant si tout est vide.
        if: ${{ !cancelled() }}
        run: |
          OUT=dlpsgame-ps5.json
          FRESHES=()

          # On collecte les sources fraîches RÉELLEMENT produites et non vides.
          for f in dlpsgame-ps5.fresh.json exfat-ps5.fresh.json superpsx-ps5.fresh.json; do
            if [ -f "$f" ]; then
              N=$(python3 -c "import json; print(len(json.load(open('$f')).get('packages',[])))" 2>/dev/null || echo 0)
              echo "  $f : $N jeux"
              if [ "$N" -gt 0 ]; then FRESHES+=("$f"); fi
            fi
          done

          # SÉCURITÉ : si AUCUNE source n'a produit de jeu, le catalogue existant
          # est conservé intact (jamais écrasé par un cycle où tout a échoué).
          if [ ${#FRESHES[@]} -eq 0 ]; then
            echo "::warning::Aucune source fraîche exploitable — catalogue existant conservé intact."
            rm -f dlpsgame-ps5.fresh.json exfat-ps5.fresh.json superpsx-ps5.fresh.json
            echo "MERGE_SKIPPED=1" >> "$GITHUB_ENV"
            exit 0
          fi

          # ITEM 6 : merge_catalogs.py applique un garde-fou anti-corruption.
          # Codes de sortie : 0=OK (fusion écrite), 2=entrée invalide,
          # 3=run dégradé refusé. Sur rc!=0, AUCUN fichier de sortie n'est écrit
          # et l'existant reste intact → on saute le commit (MERGE_SKIPPED=1).
          # En full mensuel, on passe --full pour désactiver le seuil de rétrécissement.
          MERGE_FLAGS=()
          if [ "${{ steps.config.outputs.mode }}" = "full" ]; then
            MERGE_FLAGS+=("--full")
          fi

          # Sauvegarder le catalogue existant pour le diff
          if [ -f "$OUT" ]; then
            cp "$OUT" dlpsgame-ps5.previous.json
            # Fusion incrémentale : sources fraîches d'abord (métadonnées à jour),
            # catalogue existant ensuite (préserve jeux disparus, miroirs accumulés,
            # et tout l'enrichissement RAWG via _enrichedAt / metadata).
            echo "Fusion incrémentale dans $OUT (sources : ${FRESHES[*]}, existant)…"
            if python3 scripts/merge_catalogs.py dlpsgame-ps5.merged.json "${MERGE_FLAGS[@]}" "${FRESHES[@]}" "$OUT"; then
              mv dlpsgame-ps5.merged.json "$OUT"
            else
              rc=$?
              echo "::warning::Merge refusé (rc=$rc) — catalogue existant conservé intact, commit ignoré."
              rm -f dlpsgame-ps5.merged.json dlpsgame-ps5.previous.json
              rm -f dlpsgame-ps5.fresh.json exfat-ps5.fresh.json superpsx-ps5.fresh.json
              echo "MERGE_SKIPPED=1" >> "$GITHUB_ENV"
              exit 0
            fi
          else
            echo "Premier run : initialisation du catalogue depuis les sources fraîches."
            python3 scripts/merge_catalogs.py "$OUT" "${MERGE_FLAGS[@]}" "${FRESHES[@]}"
          fi

          rm -f dlpsgame-ps5.fresh.json exfat-ps5.fresh.json superpsx-ps5.fresh.json

          # On aligne le nom du fichier de warnings sur le catalogue canonique.
          if [ -f dlpsgame-ps5.fresh.warnings.txt ]; then
            mv -f dlpsgame-ps5.fresh.warnings.txt dlpsgame-ps5.warnings.txt
          fi

      # ──────────────────────────────────────────────────────────────
      # ENRICHISSEMENT RAWG (TTL dynamique)
      # ──────────────────────────────────────────────────────────────
      - name: Enrich metadata (RAWG, dynamic TTL)
        if: env.MERGE_SKIPPED != '1'
        timeout-minutes: 30
        env:
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        run: |
          # Enrichissement avec TTL dynamique :
          # - Nouveaux jeux : enrichis immédiatement
          # - Matchés RAWG : rafraîchis tous les 30 jours (ITEM 3 : ttl 3 → 30)
          # - Non matchés : réessayés tous les 14 jours
          # Sans secret RAWG_API_KEY, le script ne fait rien.
          # NB : RAWG sert UNIQUEMENT aux métadonnées (note, genres, date,
          # metacritic). Il ne fournit PAS de jaquette → ne touche plus posterUrl.
          # ITEM 9 : --concurrency 4 (débit global auto-borné ~5 req/s par token-bucket).
          if [ -f dlpsgame-ps5.json ]; then
            python3 scripts/enrich_rawg.py dlpsgame-ps5.json --ttl-days 30 --max-calls 900 --concurrency 4
          fi

      # ──────────────────────────────────────────────────────────────
      # ENRICHISSEMENT JAQUETTES (IGDB) — vraies covers portrait
      # ──────────────────────────────────────────────────────────────
      - name: Enrich covers (IGDB)
        if: env.MERGE_SKIPPED != '1'
        continue-on-error: true
        timeout-minutes: 30
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          # Récupère la VRAIE jaquette PS5 (cover portrait) depuis IGDB et la
          # pose dans posterUrl. Sans secrets TWITCH_CLIENT_ID/SECRET, no-op.
          # En l'absence de jaquette IGDB, on garde la cover scrapée du site.
          # ITEM 9 : --concurrency 3 (débit plafonné STRICTEMENT à 4 req/s par token-bucket).
          if [ -f dlpsgame-ps5.json ]; then
            python3 scripts/enrich_igdb.py dlpsgame-ps5.json --ttl-days 30 --max-calls 500 --concurrency 3
          fi

      # ──────────────────────────────────────────────────────────────
      # SONDAGE DES TAILLES (hébergeurs fiables sans clé)
      # ──────────────────────────────────────────────────────────────
      - name: Probe hoster sizes
        if: env.MERGE_SKIPPED != '1'
        continue-on-error: true
        timeout-minutes: 30
        run: |
          # Complète les sizeBytes manquants en interrogeant vikingfile/mega/
          # gofile (octets exacts, sans téléchargement). Non bloquant.
          # ITEM 9 : --concurrency 6 (hébergeurs distincts, pas de rate-limit strict).
          if [ -f dlpsgame-ps5.json ]; then
            python3 scripts/hoster_size.py --catalog dlpsgame-ps5.json --max 400 --concurrency 6
          fi

      # ──────────────────────────────────────────────────────────────
      # FINALISATION PEGASUS (formats visibles + assainissement tailles)
      # ──────────────────────────────────────────────────────────────
      - name: Finalize for Pegasus
        if: env.MERGE_SKIPPED != '1'
        run: |
          # Surface le format (formatLabel + ligne "Format:" dans la description),
          # canonicalise fileFormat, retire les tailles aberrantes (> 2 To), et
          # nettoie les liens invalides. Idempotent.
          if [ -f dlpsgame-ps5.json ]; then
            python3 scripts/pegasus_finalize.py dlpsgame-ps5.json
          fi

      # ──────────────────────────────────────────────────────────────
      # MÉTRIQUES ET DIFF
      # ──────────────────────────────────────────────────────────────
      - name: Generate metrics and diff
        if: always()
        run: |
          if [ -f dlpsgame-ps5.json ]; then
            python3 scripts/scrape_metrics.py metrics dlpsgame-ps5.json --out scrape-metrics.json 2>/dev/null || true
          fi
          if [ -f dlpsgame-ps5.previous.json ] && [ -f dlpsgame-ps5.json ]; then
            python3 scripts/scrape_metrics.py diff dlpsgame-ps5.previous.json dlpsgame-ps5.json --out diff-report.json 2>/dev/null || true
            rm -f dlpsgame-ps5.previous.json
          fi

      - name: Health check
        if: always()
        run: |
          if [ -f dlpsgame-ps5.json ]; then
            python3 scripts/scrape_metrics.py health dlpsgame-ps5.json --min-games 500 2>/dev/null || true
          fi

      - name: Show cache stats
        if: always()
        run: |
          if [ -d .scrape_cache ]; then
            echo "### Cache disque" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Fichiers en cache : $(ls .scrape_cache | wc -l)" >> $GITHUB_STEP_SUMMARY
            echo "- Taille : $(du -sh .scrape_cache | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d .scrape_cache_superpsx ]; then
            echo "- Cache SuperPSX : $(du -sh .scrape_cache_superpsx | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -d .scrape_cache_api ]; then
            echo "- Cache API : $(du -sh .scrape_cache_api | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f .scrape_manifest_api.json ]; then
            echo "- Manifest API : $(python3 -c 'import json; d=json.load(open(".scrape_manifest_api.json")); print(len(d.get("entries",{})))' 2>/dev/null || echo '?') entrées" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f .scrape_manifest_superpsx.json ]; then
            echo "- Manifest SuperPSX : $(python3 -c 'import json; d=json.load(open(".scrape_manifest_superpsx.json")); print(len(d.get("entries",{})))' 2>/dev/null || echo '?') entrées" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Show summary
        if: always()
        run: |
          echo "### Catalogue généré" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f dlpsgame-ps5.json ]; then
            GAMES=$(python3 -c 'import json; print(len(json.load(open("dlpsgame-ps5.json"))["packages"]))' 2>/dev/null || echo "0")
            SIZE=$(du -h dlpsgame-ps5.json | cut -f1)
            echo "- Fichier : \`dlpsgame-ps5.json\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "- Nombre de jeux : **$GAMES**" >> $GITHUB_STEP_SUMMARY
            if [ "$GAMES" = "0" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠ **Aucun jeu scrapé** — vérifiez les logs du scraper." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ⚠ Aucun fichier JSON généré" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f dlpsgame-ps5.warnings.txt ]; then
            WARNINGS=$(wc -l < dlpsgame-ps5.warnings.txt)
            echo "- Pages en échec : $WARNINGS" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f scrape-metrics.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Métriques" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          m = json.load(open('scrape-metrics.json'))
          print(f\"- Jeux avec taille : {m.get('games_with_size', '?')}/{m.get('total_games', '?')}\")
          print(f\"- Jeux avec poster : {m.get('games_with_poster', '?')}\")
          print(f\"- Liens moyens/jeu : {m.get('avg_links_per_game', '?')}\")
          " 2>/dev/null || true
          fi
          if [ -f diff-report.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Diff" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          d = json.load(open('diff-report.json'))
          print(f\"- Ajoutés : {d.get('added', 0)} | Supprimés : {d.get('removed', 0)} | Modifiés : {d.get('updated', 0)}\")
          " 2>/dev/null || true
          fi

      - name: Commit & push
        if: env.MERGE_SKIPPED != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add the files
          git add -f dlpsgame-ps5.json dlpsgame-ps5.warnings.txt scrape-metrics.json .scrape_manifest*.json
          
          # Commit
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore(scrape): mise a jour catalogue PS5 ($DATE)" || echo "No changes to commit"
          
          # Sync and Force Push
          git fetch origin main
          git rebase origin/main
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main --force-with-lease
          
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dlpsgame-ps5-catalog
          path: |
            dlpsgame-ps5.json
            dlpsgame-ps5.warnings.txt
            scrape-metrics.json
            diff-report.json
          if-no-files-found: ignore
          retention-days: 14
